<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soul Site Supervisor</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0a0a0a; }
.glass {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border:1px solid transparent;
  border-image: linear-gradient(45deg,#D4AF37,transparent) 1;
}
.fade { animation:fade 0.5s ease; }
@keyframes fade { from{opacity:0} to{opacity:1} }
</style>
</head>

<body class="text-white p-5 font-sans">

<h1 class="text-2xl font-bold mb-4">Supervisor Upload</h1>

<div class="glass p-4 rounded-xl space-y-4">

  <!-- File Input -->
  <input type="file" id="fileInput" accept="image/*,video/*" capture="environment" class="w-full text-sm">

  <!-- Category -->
  <select id="category" class="w-full p-2 bg-black rounded">
    <option>Villa</option>
    <option>Studio</option>
    <option>House</option>
  </select>

  <!-- Status -->
  <input id="status" placeholder="Status update..." class="w-full p-2 bg-black rounded">

  <!-- Upload Button -->
  <button onclick="upload()" class="w-full bg-yellow-500 text-black font-bold p-3 rounded-lg">
    Send Report
  </button>

</div>

<!-- Loader -->
<div id="loader" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
  <div class="text-center">
    <div class="animate-spin h-10 w-10 border-4 border-yellow-500 border-t-transparent rounded-full mx-auto"></div>
    <p class="mt-3">Uploading to Satellite...</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTeeq2Dl9FG4eChBYLNlG1VrDSf2qoxWI",
  authDomain: "soul-architech-tracker.firebaseapp.com",
  projectId: "soul-architech-tracker",
  storageBucket: "soul-architech-tracker.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

window.upload = async function() {
  const file = document.getElementById('fileInput').files[0];
  const category = document.getElementById('category').value;
  const status = document.getElementById('status').value;

  if(!file) return alert('Select file');

  document.getElementById('loader').classList.remove('hidden');

  try {
    // Location
    let location = "Unknown";
    if(navigator.geolocation){
      const pos = await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej));
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      location = `${lat.toFixed(3)}, ${lon.toFixed(3)}`;
    }

    // Upload to Storage
    const storageRef = ref(storage, 'uploads/' + Date.now());
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);

    // Save to Firestore
    await addDoc(collection(db, "uploads"), {
      url,
      type: file.type.includes('video') ? 'video' : 'image',
      category,
      status,
      location,
      timestamp: Date.now()
    });

    // Haptic
    if(navigator.vibrate) navigator.vibrate([100,50,100]);

    alert('Uploaded Successfully');

  } catch(e){
    alert('Error: '+e);
  }

  document.getElementById('loader').classList.add('hidden');
}
</script>

</body>
</html>
