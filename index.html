<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Supervisor | Animated</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { 
            --gold: #FFD700; 
            --bg: #0a0a0a; 
        }
        
        body { 
            background: #111; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        /* Rotating Golden Border Container */
        .box {
            position: relative;
            width: 400px;
            padding: 3px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 25px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Animation Logic */
        .box::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(transparent, transparent, transparent, var(--gold));
            animation: rotate-border 4s linear infinite;
        }

        .box::after {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(transparent, transparent, transparent, #fff0a0);
            animation: rotate-border 4s linear infinite;
            animation-delay: -2s;
        }

        @keyframes rotate-border {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Internal Glass Content */
        .card { 
            background: #151515; 
            backdrop-filter: blur(20px);
            padding: 30px; 
            border-radius: 22px; 
            width: 100%;
            z-index: 10;
            box-sizing: border-box;
        }

        h2 { color: var(--gold); text-align: center; margin-bottom: 25px; letter-spacing: 2px; text-transform: uppercase; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.8rem; color: #aaa; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 10px; color: white; outline: none; box-sizing: border-box;
        }

        button { 
            width: 100%; padding: 15px; 
            background: linear-gradient(45deg, #b8860b, #FFD700); 
            border: none; border-radius: 10px; 
            color: #000; font-weight: 800; cursor: pointer; transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        #preview { width: 100%; border-radius: 10px; margin-top: 15px; display: none; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div class="box">
    <div class="card">
        <h2>Soul Supervisor</h2>
        
        <div class="input-group">
            <label>CAPTURE SITE PROGRESS</label>
            <input type="file" id="photoInput" accept="image/*" onchange="previewImg(event)">
            <img id="preview">
        </div>

        <div class="input-group">
            <label>WORK CATEGORY</label>
            <select id="categorySelect">
                <option value="Villa-Exterior">Villa Exterior</option>
                <option value="Floor-1">Floor 1</option>
                <option value="Floor-2">Floor 2</option>
                <option value="Foundation-Work">Foundation Work</option>
            </select>
        </div>

        <div class="input-group">
            <label>LIVE UPDATES</label>
            <textarea id="statusInput" rows="3" placeholder="Status..."></textarea>
        </div>

        <button id="submitBtn" onclick="sendReport()">Send Report</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBTeeq2Dl9FG4eChBYLNlG1VrDSf2qoxWI",
        authDomain: "soul-architech-tracker.firebaseapp.com",
        projectId: "soul-architech-tracker",
        storageBucket: "soul-architech-tracker.firebasestorage.app",
        messagingSenderId: "425530061134",
        appId: "1:425530061134:web:1652492c2038673e6c2e1f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function previewImg(event) {
        const reader = new FileReader();
        reader.onload = function() {
            document.getElementById('preview').src = reader.result;
            document.getElementById('preview').style.display = 'block';
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    async function sendReport() {
        const file = document.getElementById('photoInput').files[0];
        const category = document.getElementById('categorySelect').value;
        const status = document.getElementById('statusInput').value;
        const btn = document.getElementById('submitBtn');

        if (!file) return alert("Bhai photo daal!");

        btn.disabled = true;
        btn.innerText = "COMPRESSING...";

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = async () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800; 
                const scale = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);

                btn.innerText = "PUSHING TO SOUL CLOUD...";
                try {
                    await db.collection('reports').add({
                        imageUrl: compressedBase64,
                        category: category,
                        status: status,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    alert("Done! Soul Dashboard Updated 🔥");
                    location.reload();
                } catch (err) {
                    alert("Lafda: " + err.message);
                    btn.disabled = false;
                }
            }
        }
    }
</script>
</body>
</html>
