<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Supervisor | Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #bda062; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { position: relative; width: 90%; max-width: 400px; padding: 5px; background: #1a1a1a; border-radius: 35px; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .box::before { content: ''; position: absolute; width: 150%; height: 150%; background: conic-gradient(transparent, transparent, transparent, var(--gold)); animation: rotate 3s linear infinite; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .card { background: #1e1f21; padding: 30px; border-radius: 30px; position: relative; z-index: 10; width: 100%; box-sizing: border-box; }
        h2 { color: var(--gold); text-align: center; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px; font-weight: 700; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; background: #121212; border: 1px solid #333; border-radius: 12px; color: white; outline: none; box-sizing: border-box; }
        input[type="range"] { -webkit-appearance: none; height: 6px; background: #333; border-radius: 5px; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--gold); border-radius: 50%; }
        button { width: 100%; padding: 16px; background: var(--gold); border: none; border-radius: 12px; color: black; font-weight: 800; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #preview, #v-preview { width: 100%; border-radius: 15px; margin-top: 15px; display: none; border: 2px solid var(--gold); }
        .percent-display { color: var(--gold); font-weight: bold; float: right; }
    </style>
</head>
<body>

<div class="box">
    <div class="card">
        <h2>Soul Cloud</h2>
        <div class="input-group">
            <label>Site Media (Photo/Video)</label>
            <input type="file" id="photoInput" accept="image/*,video/*" onchange="previewMedia(event)">
            <img id="preview">
            <video id="v-preview" controls></video>
        </div>
        <div class="input-group">
            <label>Progress <span id="progVal" class="percent-display">0%</span></label>
            <input type="range" id="progSlider" min="0" max="100" value="0" oninput="document.getElementById('progVal').innerText = this.value + '%'">
        </div>
        <div class="input-group">
            <label>Category</label>
            <select id="categorySelect">
                <option value="Villa-Exterior">Villa Exterior</option>
                <option value="Ground Floor-Hall+pool">Ground Floor Hall +pool</option>
                <option value="Floor-1">Floor 1</option>
                <option value="Floor-2">Floor 2</option>
                <option value="Floor-Balcony-3">Floor Balcony 3</option>
                <option value="Terrace-4">Terrace 4</option>
                <option value="House-Exterior">House Exterior</option>
                <option value="Ground Floor-Hall">Ground Floor Hall</option>
                <option value="Floor-1">Floor 1</option>
                <option value="Floor-2">Floor 2</option>
                <option value="Floor-3">Floor 3</option>
                <option value="Terrace-4">Terrace 4</option>
                <option value="Building-Exterior">Building Exterior</option>
                <option value="Ground Floor-Hall-Reception">Ground Floor Hall +Reception</option>
                <option value="Floor-1">Floor 1</option>
                <option value="Floor-2">Floor 2</option>
                <option value="Floor-3">Floor 3</option>
                <option value="Floor-4">Floor 4</option>
                <option value="Floor-5">Floor 5</option>
                <option value="Floor-6">Floor 6</option>
                <option value="Floor-7">Floor 7</option>
                <option value="Floor-8">Floor 8</option>
                <option value="Floor-9">Floor 9</option>
                <option value="Floor-10">Floor 10</option>
                <option value="Terrace-11">Terrace 11</option>
                <option value="Commercial Mall-Exterior">Commercial Mall Exterior</option>
                <option value="Ground floor-Hall">Ground floor Hall</option>
                <option value="Floor-1">Floor 1</option>
                <option value="Floor-2">Floor 2</option>
                <option value="Floor-3">Floor 3</option>
                <option value="Terrace-4">Terrace 4</option>
            </select>
        </div>
        <div class="input-group">
            <label>Status</label>
            <textarea id="statusInput" rows="2" placeholder="Update?"></textarea>
        </div>
        <button id="submitBtn" onclick="sendReport()">Send Report</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBTeeq2Dl9FG4eChBYLNlG1VrDSf2qoxWI",
        authDomain: "soul-architech-tracker.firebaseapp.com",
        projectId: "soul-architech-tracker",
        storageBucket: "soul-architech-tracker.firebasestorage.app",
        messagingSenderId: "425530061134",
        appId: "1:425530061134:web:1652492c2038673e6c2e1f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function previewMedia(event) {
        const file = event.target.files[0];
        const imgPre = document.getElementById('preview');
        const vidPre = document.getElementById('v-preview');
        
        imgPre.style.display = 'none';
        vidPre.style.display = 'none';

        if (!file) return;

        if (file.type.startsWith('video/')) {
            const videoUrl = URL.createObjectURL(file);
            vidPre.src = videoUrl;
            vidPre.style.display = 'block';
            vidPre.onloadedmetadata = function() {
                if (vidPre.duration > 61) {
                    alert("Abe 1 min se choti video daal!");
                    event.target.value = "";
                    vidPre.style.display = 'none';
                }
            };
        } else {
            imgPre.src = URL.createObjectURL(file);
            imgPre.style.display = 'block';
        }
    }

    async function sendReport() {
        const file = document.getElementById('photoInput').files[0];
        const btn = document.getElementById('submitBtn');
        if (!file) return alert("Media toh daal bhai?");

        btn.disabled = true;

        if (file.type.startsWith('image/')) {
            btn.innerText = "Resizing Photo...";
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    const MAX_SIZE = 800;
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } }
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    upload(canvas.toDataURL('image/jpeg', 0.5));
                }
            }
        } else {
            btn.innerText = "Processing Video...";
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => upload(e.target.result);
        }

        async function upload(base64Data) {
            btn.innerText = "Uploading...";
            try {
                await db.collection('reports').add({
                    imageUrl: base64Data,
                    category: document.getElementById('categorySelect').value,
                    status: document.getElementById('statusInput').value,
                    progress: parseInt(document.getElementById('progSlider').value),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Soul Dashboard Updated Boss! 🔥");
                location.reload();
            } catch (err) { 
                alert("Limit Error: File size still too big for Cloud! Try shorter/smaller."); 
                console.error(err);
                btn.disabled = false; btn.innerText = "Send Report";
            }
        }
    }
</script>
</body>
</html>
