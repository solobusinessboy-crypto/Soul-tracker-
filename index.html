<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Supervisor | Premium</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { 
            --gold: #FFD700; 
            --bright-gold: #fff0a0;
            --bg: #1a1a1a; 
            --glass: rgba(255, 255, 255, 0.08); 
        }
        
        body { 
            background: radial-gradient(circle at top right, #2c2c2c, #121212); 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }

        .card { 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.3); /* Soft Gold Border */
            padding: 30px; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: -10px 0 30px rgba(255, 215, 0, 0.1), 0 10px 30px rgba(0,0,0,0.5); /* Side Golden Glow */
            position: relative;
            overflow: hidden;
        }

        /* Side Dense Golden Accent */
        .card::before {
            content: "";
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 5px;
            background: linear-gradient(to bottom, var(--gold), var(--bright-gold), var(--gold));
        }

        h2 { 
            color: var(--gold); 
            text-align: center; 
            margin-bottom: 25px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-size: 1.4rem;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #ddd; font-weight: 500; }
        
        input, select, textarea { 
            width: 100%; padding: 14px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; 
            color: white; 
            outline: none; 
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus, select:focus { border-color: var(--gold); background: rgba(255, 255, 255, 0.1); }

        button { 
            width: 100%; padding: 16px; 
            background: linear-gradient(45deg, #D4AF37, #FFD700); 
            border: none; 
            border-radius: 12px; 
            color: #000; 
            font-weight: 800; 
            font-size: 1rem; 
            cursor: pointer; 
            transition: 0.4s; 
            margin-top: 10px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5); }
        button:disabled { background: #444; color: #888; transform: none; box-shadow: none; }

        #preview { 
            width: 100%; border-radius: 12px; margin-top: 15px; 
            display: none; border: 2px solid var(--gold); 
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Soul Supervisor</h2>
    
    <div class="input-group">
        <label>CAPTURE SITE PROGRESS</label>
        <input type="file" id="photoInput" accept="image/*" onchange="previewImg(event)">
        <img id="preview">
    </div>

    <div class="input-group">
        <label>WORK CATEGORY</label>
        <select id="categorySelect">
            <option value="Villa-Exterior">Villa Exterior</option>
            <option value="Floor-1">Floor 1</option>
            <option value="Floor-2">Floor 2</option>
            <option value="Foundation-Work">Foundation Work</option>
        </select>
    </div>

    <div class="input-group">
        <label>LIVE UPDATES</label>
        <textarea id="statusInput" rows="3" placeholder="Explain the current work status..."></textarea>
    </div>

    <button id="submitBtn" onclick="sendReport()">Push to Soul Cloud</button>
</div>

<script>
    // TERA FIREBASE CONFIG (SAB AUTO-FILLED HAIN)
    const firebaseConfig = {
        apiKey: "AIzaSyBTeeq2Dl9FG4eChBYLNlG1VrDSf2qoxWI",
        authDomain: "soul-architech-tracker.firebaseapp.com",
        projectId: "soul-architech-tracker",
        storageBucket: "soul-architech-tracker.firebasestorage.app",
        messagingSenderId: "425530061134",
        appId: "1:425530061134:web:1652492c2038673e6c2e1f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function previewImg(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const output = document.getElementById('preview');
            output.src = reader.result;
            output.style.display = 'block';
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    async function sendReport() {
        const file = document.getElementById('photoInput').files[0];
        const category = document.getElementById('categorySelect').value;
        const status = document.getElementById('statusInput').value;
        const btn = document.getElementById('submitBtn');

        if (!file) return alert("Bhai, photo select kar le!");

        btn.disabled = true;
        btn.innerText = "UPLOADING TO SOUL DATABASE...";

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            try {
                // Photo ko Base64 text banakar Firestore mein save kar rahe hain
                await db.collection('reports').add({
                    imageUrl: reader.result, 
                    category: category,
                    status: status,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Soul Report Synced Successfully! 🔥");
                location.reload();
            } catch (error) {
                console.error(error);
                alert("Lafda hua: " + error.message);
                btn.disabled = false;
                btn.innerText = "Push to Soul Cloud";
            }
        };
    }
</script>

</body>
</html>
